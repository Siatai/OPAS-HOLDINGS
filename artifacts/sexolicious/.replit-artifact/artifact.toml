kind = "web"
previewPath = "/"
title = "Sexolicious — Fractional Property"
version = "1.0.0"
id = "artifacts/sexolicious"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18212

[services.development]
run = "pnpm --filter @workspace/sexolicious run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sexolicious", "run", "build" ]
publicDir = "artifacts/sexolicious/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18212"
BASE_PATH = "/"
